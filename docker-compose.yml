services:
  postgres:
    image: postgres:18.4-alpine3.24
    environment:
      POSTGRES_DB: gameish
      POSTGRES_PASSWORD: gameish
      POSTGRES_USER: gameish
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameish -d gameish"]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "5432:5432"
    volumes:
      - gameish-postgres:/var/lib/postgresql

volumes:
  gameish-postgres:
